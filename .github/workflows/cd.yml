name: CD

on:
  workflow_call:
    secrets:
      TURBO_TOKEN: { required: false }
      CLOUDFLARE_API_TOKEN: { required: false }

env:
  GLH_VARS_JSON: ${{ vars.GLH_VARS_JSON }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TEAMID: ${{ vars.TURBO_TEAMID }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Init
        uses: git-lfs-hub/ci-cd/actions/init-deploy@main

      - name: Deploy Prod
        uses: git-lfs-hub/ci-cd/actions/deploy@main
        with:
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Turbo Summary
        uses: git-lfs-hub/ci-cd/actions/turbo-summary@main
