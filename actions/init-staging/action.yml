name: "Init staging render"
description: |
  Pin the deploy env to staging in .config.json, then render staging artifacts
  (vars.json + wrangler.jsonc + github-app.md). .config.json outranks GLH_ENV, so
  every render in the pipeline — including the turbo //#config re-render during
  deploy that strict-env mode strips GLH_ENV from — resolves staging.

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version-file: "server/package.json"

    - uses: git-lfs-hub/ci-cd/actions/init-bun@main

    - name: Render staging artifacts
      shell: bash
      run: |
        echo '{ "env": "staging" }' > .config.json
        bun run config
