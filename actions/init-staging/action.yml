name: "Init staging render"
description: |
  Render staging artifacts (vars.json + wrangler.jsonc + github-app.md) via
  `bun run config --env staging`, which reads prod vars from the GLH_VARS_JSON
  env var (set by caller workflow) and appends -staging to the Worker names and
  the S3 bucket.

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version-file: "server/package.json"

    - uses: git-lfs-hub/ci-cd/actions/init-bun@main

    - name: Render staging artifacts
      shell: bash
      run: bun run config
