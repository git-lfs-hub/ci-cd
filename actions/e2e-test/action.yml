name: "E2E test"
description: Run the e2e test suite against a deployed Worker.

inputs:
  gh-pat:
    description: GitHub PAT used by the e2e tests.
    required: true
  login-secret:
    description: LOGIN_SECRET used by the e2e tests.
    required: true
  pr-number:
    description: PR number (or 'main') for test isolation.
    required: true

runs:
  using: composite
  steps:
    # - name: Install git-lfs
    #   shell: bash
    #   run: sudo apt-get update && sudo apt-get install -y git-lfs

    - name: Test
      shell: bash
      working-directory: e2e
      env:
        GH_PAT: ${{ inputs.gh-pat }}
        LOGIN_SECRET: ${{ inputs.login-secret }}
        PR_NUMBER: ${{ inputs.pr-number }}
        RUN_ID: ${{ github.run_id }}
      run: bun --bun run e2e-test
