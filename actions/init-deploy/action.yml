name: "Init"
description: "Checkout, set up Bun, install dependencies and configure"

inputs:
  env:
    description: |
      Deploy env to pin in .config.json (e.g. staging). Empty = prod/default.
      .config.json outranks GLH_ENV, so every render in the pipeline — including
      the turbo //#config re-render during deploy that strict-env mode strips
      GLH_ENV from — resolves this env.
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set environment variables
      run: echo 'TURBO_RUN_SUMMARY=true' >> $GITHUB_ENV
      shell: bash

    - uses: actions/setup-node@v6
      with:
        node-version-file: "server/package.json"

    - uses: git-lfs-hub/ci-cd/actions/init-bun@main

    - name: Pin deploy env
      if: inputs.env != ''
      shell: bash
      run: |
        printf '{ "env": "%s" }\n' '${{ inputs.env }}' > .config.json
        echo "TURBO_REMOTE_CACHE_SIGNATURE_KEY=${{ inputs.env }}" >> "$GITHUB_ENV"

    # Avoid turbo cache invalidations downstream
    - run: bun run config
      shell: bash
