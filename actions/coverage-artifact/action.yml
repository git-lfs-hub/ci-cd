name: Coverage Artifact
description: Generate coverage badge and upload coverage/ as a Pages artifact.

inputs:
  thresholds:
    description: 'JSON dict mapping minimum percentage to color, e.g. {"90": "green", "80": "yellow"}. Defaults in actions/coverage-defaults.ts.'

runs:
  using: composite
  steps:
    - run: bun "$GITHUB_ACTION_PATH/coverage-badge.ts" '${{ inputs.thresholds }}'
      shell: bash

    - id: deployment
      uses: actions/upload-pages-artifact@v5
      with: { path: ./coverage }
