name: Coverage Report
description: Download main branch coverage and post a PR coverage comparison comment.

inputs:
  coverage-url:
    description: Base URL for the published main branch coverage files.
    required: true
  thresholds:
    description: 'JSON dict mapping minimum percentage to color, e.g. {"90": "green", "80": "yellow"}'
    default: '{"90": "green", "80": "yellow", "50": "orange", "1": "red", "0": "grey"}'

runs:
  using: composite
  steps:
    - name: Download Main Coverage
      run: |
        mkdir coverage/main
        for f in coverage-summary.json coverage-final.json; do
          curl -L "${{ inputs.coverage-url }}/$f" -o "coverage/main/$f"
        done
      shell: bash
      continue-on-error: true

    - name: Map thresholds to icons
      id: icons
      run: bun "$GITHUB_ACTION_PATH/threshold-icons.ts" '${{ inputs.thresholds }}'
      shell: bash

    - name: Report Coverage
      uses: davelosert/vitest-coverage-report-action@v2
      with:
        file-coverage-mode: changes-affected
        json-summary-compare-path: coverage/main/coverage-summary.json
        threshold-icons: ${{ steps.icons.outputs.threshold-icons }}
